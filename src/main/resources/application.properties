spring.application.name=fiscally
spring.profiles.active=dev

server.port=8181    


## Database Connection (Hardcoded for Local Dev)
spring.datasource.url=jdbc:mysql://localhost:3306/fiscally
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# server api
server.servlet.context-path=/api/v1.0

## Hibernate (Updates DB structure automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${ADMIN}

# JWT Configuration
# This is a 256-bit Hex key (Required for HS256 algorithm)
application.security.jwt.secret-key=${JWT_SECRET_KEY}
# Token validity: 1 day (86400000 milliseconds)
application.security.jwt.expiration=${JWT_EXPIRATION}